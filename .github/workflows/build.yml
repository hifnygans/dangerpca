name: Build and Package ERP

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux (.deb package)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libsdl2-dev libsqlite3-dev

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build Code
        run: |
          cd build
          make -j$(nproc)

      - name: Generate Debian Package
        run: |
          cd build
          cpack -G DEB

      - name: Upload Debian Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dangerpca-linux-deb
          path: build/*.deb

      - name: Upload Linux Executable
        uses: actions/upload-artifact@v4
        with:
          name: dangerpca-linux-binary
          path: build/dangerpca

  build-windows:
    name: Build Windows (.exe binary)
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up MSVC & Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install vcpkg Dependencies
        run: |
          vcpkg install sdl2:x64-windows-static sqlite3:x64-windows-static

      - name: Configure CMake (Static Linking)
        run: |
          mkdir build
          cd build
          cmake .. -A x64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static

      - name: Build Executable
        run: |
          cd build
          cmake --build . --config Release

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: dangerpca-windows-x64
          path: build/Release/dangerpca.exe

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Linux DEB Package
        uses: actions/download-artifact@v4
        with:
          name: dangerpca-linux-deb
          path: ./dist-linux-deb

      - name: Download Linux Binary
        uses: actions/download-artifact@v4
        with:
          name: dangerpca-linux-binary
          path: ./dist-linux-bin

      - name: Download Windows Binary
        uses: actions/download-artifact@v4
        with:
          name: dangerpca-windows-x64
          path: ./dist-windows

      - name: Prepare Release Assets
        run: |
          mkdir -p ./release-assets
          # Copy debian package
          cp ./dist-linux-deb/*.deb ./release-assets/ || true
          # Copy linux standalone binary and rename
          cp ./dist-linux-bin/dangerpca ./release-assets/dangerpca-linux || true
          # Copy windows exe and rename
          cp ./dist-windows/dangerpca.exe ./release-assets/dangerpca-windows.exe || true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
